<script>
const QUESTOES = [
  {num:1, exame:"XLIV Exame — 2025", titulo:"Prisão Temporária — Rol Taxativo e Homicídio Culposo CTB", enunciado:"Peterson teve sua prisão temporária decretada pelo prazo de trinta dias, ao ser investigado pela prática do crime de homicídio culposo na direção de veículo automotor, disposto no Art. 302 da Lei nº 9.503/1997 (Código de Trânsito Brasileiro), cuja pena cominada é de dois a quatro anos de detenção. A decisão foi fundamentada na necessidade da coleta de provas imprescindíveis durante a investigação policial. Você foi procurado(a), como advogado(a), para atuar no melhor interesse de Peterson, no primeiro dia da sua prisão.", comando:"Assinale a opção que apresenta, corretamente, o pedido cabível tendo em vista os interesses de seu cliente.", gabarito:"C", alt:{"A": "A liberdade provisória com arbitramento de fiança, pois a pena máxima do crime não ultrapassa quatro anos.", "B": "A liberdade provisória com aplicação de medidas cautelares diversas da prisão, pois não demonstrada a imprescindibilidade da medida.", "C": "O relaxamento imediato da prisão ilegal, pois o crime de homicídio culposo na direção de veículo automotor não está no rol dos crimes que autorizam a prisão temporária.", "D": "O relaxamento da prisão ilegal a partir do quinto dia de prisão, pois a prática do homicídio culposo na direção de veículo automotor não configura crime hediondo e o prazo da prisão temporária deveria ser de 5 dias, e não, de 30 dias."}, fb:{"A": "Incorreta. A prisão é ILEGAL — não basta pedir liberdade provisória, que pressupõe prisão legal. A medida correta para prisão ilegal é o relaxamento (art. 5º, LXV, CF).", "B": "Incorreta. Medidas cautelares diversas substituem prisões legais. Aqui a prisão é ilegal desde a origem, por ausência de previsão legal.", "C": "Correta! A Lei 7.960/89 prevê rol TAXATIVO dos crimes que autorizam a prisão temporária. Homicídio culposo CTB NÃO consta desse rol. Prisão temporária decretada para crime fora do rol = prisão ILEGAL = relaxamento imediato.", "D": "Incorreta. O problema não é só o prazo de 30 dias — é a completa ausência de autorização legal para o crime. Mesmo que fosse decretada pelo prazo correto de 5 dias, ainda seria ilegal por falta de previsão."}, fund:"Lei 7.960/89: rol taxativo dos crimes que autorizam a prisão temporária. Homicídio culposo CTB não integra o rol. Art. 5º, LXV, CF: prisão ilegal deve ser imediatamente relaxada. Distinção: relaxamento (prisão ilegal) ≠ liberdade provisória (prisão legal, mas desnecessária ou substituível).", caqui:"Pensa no rol da prisão temporária como uma lista VIP de crimes: se o crime não está na lista, não entra. Homicídio culposo no CTB = não está na lista. Prisão temporária = ilegal. E quando a prisão é ilegal, a medida é o RELAXAMENTO — não liberdade provisória, não revogação. Triângulo da liberdade: RELAXAMENTO = prisão ilegal. LIBERDADE PROVISÓRIA = prisão legal mas substituível. REVOGAÇÃO = prisão preventiva legal que perdeu seus fundamentos."},
  {num:2, exame:"XLII Exame — 2024", titulo:"Acesso a Dados do Celular Exige Ordem Judicial — Prova Ilícita", enunciado:"Policiais ingressaram no imóvel pertencente a Paulo, às 4 horas da manhã, em regular perseguição iniciada logo após a prática de um homicídio, a fim de prender Júnior (filho de Paulo) em flagrante delito. Ao ingressar no imóvel, os policiais capturaram Júnior e, em busca pessoal, localizaram o telefone celular do custodiado no bolso da calça. Além de prender Júnior em flagrante, a autoridade policial determinou o encaminhamento do telefone apreendido à perícia técnica, a fim de descobrir seu conteúdo. O laudo pericial indicou que nele havia conversas que confirmavam a pertinência de Júnior em associação criminosa. Assim, foi instaurado inquérito policial contra Júnior, para apurar o delito de associação criminosa.", comando:"Nesse caso, assinale a opção que indica corretamente a alegação que você, como advogado(a) de Júnior, deve apresentar.", gabarito:"D", alt:{"A": "A prisão em flagrante foi válida, porém esta não autoriza a apreensão do aparelho telefônico do flagranteado, o qual somente poderia ser apreendido por ordem judicial prévia e expressa.", "B": "O ingresso em domicílio para prisão em flagrante não pode ocorrer no período noturno, havendo nulidade de todos os atos subsequentes ao ingresso dos policiais no domicílio de Paulo.", "C": "O ingresso no interior da residência de terceiros depende de expedição de mandado de busca, havendo nulidade de todos os atos subsequentes ao ingresso dos policiais no domicílio de Paulo.", "D": "A prisão em flagrante foi válida, entretanto, a autoridade policial não poderia determinar a quebra de sigilo de dados dos telefones apreendidos, havendo nulidade da prova colhida a partir da perícia do aparelho e de todos os atos subsequentes."}, fb:{"A": "Incorreta. A apreensão do celular é válida — em busca pessoal no flagrante, o que está com o preso pode ser apreendido. O problema NÃO é a apreensão física, mas o acesso ao conteúdo.", "B": "Incorreta. A CF (art. 5º, XI) permite ingresso em domicílio em caso de flagrante delito a qualquer hora, inclusive à noite. A perseguição imediata pós-crime legitima o ingresso noturno.", "C": "Incorreta. O mandado de busca não era necessário — havia perseguição imediata de flagrante delito. O ingresso foi lícito.", "D": "Correta! Dois momentos distintos: (1) PRISÃO E APREENSÃO DO CELULAR = lícitas (flagrante + busca pessoal). (2) ACESSO AO CONTEÚDO DO CELULAR = exige autorização judicial (STF RE 1.042.075 e HC 168.052 — dados digitais são protegidos pelo sigilo de dados, art. 5º, XII, CF). Policial não pode ordenar diretamente a perícia de dados sem autorização judicial."}, fund:"Art. 5º, XI, CF: inviolabilidade do domicílio — exceção para flagrante delito, a qualquer hora. Art. 5º, XII, CF: sigilo de dados — protegido constitucionalmente. STF: acesso ao conteúdo de celular apreendido exige ordem judicial específica. Teoria dos frutos da árvore envenenada: prova ilícita contamina as derivadas.", caqui:"Pensa assim: pegar o celular do bolso do preso = lícito (busca pessoal no flagrante). Abrir o celular e ler as mensagens = precisa de autorização judicial. É como entrar na casa em perseguição = lícito. Revirar os gavetos todos sem mandado = ilícito. O celular moderno é uma extensão da intimidade — o STF equiparou o acesso aos dados à busca domiciliar. Apreendeu o aparelho? Ótimo. Para acessar o conteúdo: vai ao juiz."},
  {num:3, exame:"XLII Exame — 2024", titulo:"Preventiva de Ofício Vedada — Homicídio Culposo Não Admite Preventiva", enunciado:"Em um inquérito policial, o Juiz decretou, de ofício, a prisão preventiva de Débora, sem que esta possuísse qualquer antecedente criminal, apontando como fundamento para a prisão a gravidade em abstrato do crime de homicídio culposo. Certo de que não houve a decretação anterior de medida cautelar diversa da prisão, assinale a opção que apresenta, corretamente, a alegação que você, como advogado(a) de Débora, deve apresentar.", comando:"Assinale a opção que apresenta, corretamente, a alegação que você, como advogado(a) de Débora, deve apresentar.", gabarito:"A", alt:{"A": "O magistrado não pode decretar prisão preventiva de ofício, bem como não é cabível a decretação de prisão preventiva em delitos culposos.", "B": "O magistrado pode, de ofício, decretar prisão preventiva, e a gravidade em abstrato do crime é fundamento legítimo para a decretação de preventiva.", "C": "O magistrado pode decretar prisão preventiva de ofício no inquérito e no processo, mas a gravidade em abstrato de um crime não é motivo legítimo para a decretação de preventiva.", "D": "O magistrado não pode decretar prisão preventiva de ofício, mas a gravidade em abstrato de um crime é um motivo legítimo para a decretação da prisão preventiva mesmo quando o suspeito for primário."}, fb:{"A": "Correta! Dois vícios simultâneos: (1) DE OFÍCIO: Lei 13.964/19 (Pacote Anticrime) reformou o art. 311 CPP — vedada a decretação de preventiva de ofício em QUALQUER fase. Exige requerimento do MP, querelante ou representação da autoridade policial. (2) CRIME CULPOSO: art. 312, §1º CPP (Lei 13.964/19) — a preventiva não será decretada com a finalidade de antecipação de pena nem com base em delitos culposos.", "B": "Incorreta. Errou nos dois pontos: não pode de ofício + gravidade abstrata NÃO é fundamento legítimo (STJ Súmula 697 e jurisprudência consolidada).", "C": "Incorreta. O magistrado NÃO pode decretar de ofício nem no inquérito nem no processo — a reforma de 2019 vedou em todas as fases.", "D": "Incorreta. A gravidade abstrata do crime NÃO é fundamento válido para a preventiva — isso é pacífico no STJ e STF."}, fund:"Art. 311 CPP (Lei 13.964/19): preventiva só por requerimento do MP, querelante ou representação da autoridade policial — vedada a decretação de ofício. Art. 312, §1º CPP: vedada preventiva para antecipar pena ou em delitos culposos. STJ/STF: gravidade abstrata não fundamenta preventiva.", caqui:"O Pacote Anticrime (2019) foi uma revolução na prisão preventiva: acabou com o 'juiz decreta sozinho'. Hoje, sem pedido = sem preventiva. E crime culposo = sem preventiva (foi o legislador dizendo: quem não quis o resultado não justifica a prisão cautelar). A gravidade abstrata do crime também não vale — senão todo crime grave geraria prisão preventiva automática, o que é inconstitucional. Três vedações que a FGV ama cobrar: sem de ofício, sem culposo, sem gravidade abstrata."},
  {num:4, exame:"XLI Exame — 2024", titulo:"Flagrante Próprio e Obrigatório — Delegado Presencia o Crime", enunciado:"Ricardo é policial civil e disparou seis vezes, com intenção de matar, contra Marilene, sua ex-amante, que veio a óbito. Diversos transeuntes testemunharam os fatos, inclusive o delegado de polícia que trabalha com Ricardo, que estava de plantão no momento e imediatamente realizou a prisão em flagrante do acusado e apreendeu sua pistola, lavrando o auto de prisão em flagrante pela prática do crime de feminicídio.", comando:"Diante do caso narrado, sobre a lavratura do flagrante assinale a opção correta.", gabarito:"C", alt:{"A": "É o caso de flagrante impróprio e facultativo e o delegado pode prender Ricardo, ou, por critério de conveniência e oportunidade, postergar o flagrante.", "B": "É o caso de flagrante presumido, pois Ricardo estava com a arma na mão.", "C": "É o caso de flagrante próprio e obrigatório, e o delegado deve prender Ricardo.", "D": "O flagrante é ilegal e o delegado não poderia prender Ricardo por trabalharem juntos."}, fb:{"A": "Incorreta. Não é flagrante impróprio (que exige perseguição após o crime). E para a autoridade policial, o flagrante É OBRIGATÓRIO — não facultativo como é para o particular.", "B": "Incorreta. Flagrante presumido (art. 302, IV CPP) ocorre quando o agente é encontrado 'logo depois' com objetos do crime. Aqui o delegado PRESENCIOU o crime — é flagrante próprio.", "C": "Correta! Flagrante PRÓPRIO: o delegado estava presente e presenciou o crime sendo cometido (art. 302, I ou II CPP). Flagrante OBRIGATÓRIO: autoridades policiais têm DEVER de prender (art. 301 CPP) — não é mera faculdade como para o particular. O vínculo de trabalho entre o delegado e Ricardo não afasta a obrigação legal.", "D": "Incorreta. A relação de trabalho não cria impedimento para a prisão em flagrante. O delegado tinha DEVER legal de prender."}, fund:"Art. 302, I/II CPP: flagrante próprio — agente está cometendo ou acabou de cometer. Art. 301 CPP: autoridades policiais TÊM O DEVER de prender em flagrante (obrigatório); qualquer pessoa pode (facultativo).", caqui:"Diferença que a FGV adora: AUTORIDADE POLICIAL = flagrante OBRIGATÓRIO (dever). PARTICULAR = flagrante FACULTATIVO (pode prender, mas não é obrigado). E os tipos de flagrante do art. 302 CPP: PRÓPRIO (I e II) = crime acontecendo ou acabou de acontecer. IMPRÓPRIO/QUASE-FLAGRANTE (III) = perseguição imediata. FICTO/PRESUMIDO (IV) = encontrado logo depois com objetos do crime. O delegado VIU o crime = flagrante próprio. E era delegado = obrigação de prender."},
  {num:5, exame:"XL Exame — 2024", titulo:"Prisão Domiciliar para Gestante — Art. 318 CPP e Natureza do Crime", enunciado:"Vanessa, primária e sem antecedentes, grávida de seis meses, foi presa em flagrante no aeroporto no momento em que embarcava com destino à Espanha de posse de 10kg de substância entorpecente (cocaína). Vanessa foi autuada pela prática do crime de tráfico internacional de drogas (Art. 33, caput, c/c. Art. 40, inciso I, ambos da Lei nº 11.343/06).", comando:"Sobre a possibilidade de prisão domiciliar em favor de Vanessa, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A quantidade de drogas apreendida e a transnacionalidade do delito obstam a concessão de prisão domiciliar.", "B": "O pedido de prisão domiciliar é injustificável, tendo em vista que Vanessa ainda está no sexto mês de gestação.", "C": "A natureza não violenta do delito imputado e a gestação de Vanessa autorizam a concessão de prisão domiciliar.", "D": "Apenas se houver comprovação de gravidez de risco haverá previsão legal que justifique a concessão de prisão domiciliar."}, fb:{"A": "Incorreta. A quantidade de droga e a transnacionalidade não são obstáculos absolutos à prisão domiciliar. STF HC 143641: a natureza do crime, por si só, não impede automaticamente a substituição quando há gestante envolvida.", "B": "Incorreta. O art. 318, IV CPP não exige nenhum mês mínimo de gestação — qualquer gestante pode pleitear a prisão domiciliar. Seis meses de gestação é situação que a lei ampara.", "C": "Correta! Art. 318, IV CPP: o juiz poderá substituir a prisão preventiva por domiciliar quando a agente for gestante. O tráfico, embora grave, é crime sem violência à pessoa — isso favorece a substituição. STF HC 143641: criou presunção de substituição para gestantes, salvo crimes com violência ou grave ameaça.", "D": "Incorreta. A lei não exige 'gravidez de risco'. Qualquer gestação justifica o pleito — a lei só fala em 'gestante'."}, fund:"Art. 318, IV CPP: prisão domiciliar para gestante. STF HC 143641 (2018): presunção de substituição da prisão por domiciliar para gestantes e mães de filhos pequenos. Limitação: crimes com violência ou grave ameaça podem afastar a presunção. Tráfico sem violência = não afasta.", caqui:"A lei cria um 'salvo-conduto' para gestantes: se está presa preventivamente e é gestante, pode pedir prisão domiciliar. Não precisa ser gravidez de risco — basta estar grávida. A transnacionalidade do tráfico é grave, mas o crime não tem violência à pessoa, então a presunção do STF favorece Vanessa. Mnemônico do art. 318 CPP: 'domiciliar para quem é vulnerável' — gestante, mãe de criança até 12 anos, pessoa >80 anos, enfermo que não pode ser tratado na prisão."},
  {num:6, exame:"XXXIX Exame — 2023", titulo:"Receptação Permanente — Flagrante e Liberdade Provisória", enunciado:"André, primário, subtraiu o computador de Gustavo, enquanto este estava distraído em via pública, em uma sexta-feira. Na terça-feira da semana seguinte, após consultar as câmeras de vigilância, Gustavo identificou André como o responsável pela subtração, e acionou a Polícia Civil que, com base nas declarações de Gustavo, abordou André em via pública e com ele encontrou o computador subtraído dias antes. André foi, então, preso em flagrante pelo delito de receptação, na modalidade 'conduzir' produto de furto.", comando:"Como advogado(a) de André, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Deve ser postulado o relaxamento da prisão em flagrante, porque André praticou apenas o delito de furto, crime de natureza instantânea, inexistindo situação flagrancial.", "B": "Deve ser postulada a liberdade provisória, pois, não obstante ter praticado dois delitos em concurso material, ainda assim é cabível a suspensão condicional do processo.", "C": "André praticou delito de furto em concurso formal com receptação, o que autoriza a prisão em flagrante pelo delito de natureza permanente, mas é cabível a liberdade provisória, mediante fiança.", "D": "André praticou apenas o delito de receptação, cuja pena máxima é igual a quatro anos, por isso, não é cabível a prisão preventiva, devendo ser postulada a liberdade provisória."}, fb:{"A": "Correta conforme gabarito FGV! ⚠️ A FGV considerou que André praticou apenas FURTO (crime instantâneo), que já estava consumado há dias. Como o furto é instantâneo e não havia mais situação flagrancial, a prisão é ilegal. A receptação (conduzir) poderia configurar situação permanente, mas a FGV adotou que o contexto era de autoría do próprio furto, não receptação autônoma.", "B": "Incorreta. A suspensão condicional do processo é medida pré-processual — não é o pedido adequado para impugnar a prisão.", "C": "Incorreta. A FGV não reconheceu o concurso furto + receptação para o próprio autor do furto. O mesmo agente que furta e retém o bem não pratica receptação própria.", "D": "Incorreta. Embora tecnicamente defensável, a FGV adotou A como gabarito."}, fund:"CPP art. 302: flagrante. Furto: crime instantâneo — se consumou, não há mais situação flagrancial dias depois. Receptação: pode ser permanente. Mas: quem furta o bem e o retém não pratica receptação (teoria da consunção). Logo, se o crime é o furto (instantâneo), dias depois não há mais flagrante.", caqui:"⚠️ QUESTÃO CONTROVERSA: a FGV adotou A (relaxamento — só furto, crime instantâneo). A lógica: quem furta e fica com o produto não pratica receptação — o furto absorve o porte posterior. Como o furto é crime instantâneo e já havia passado dias, não havia mais situação flagrancial. A alternativa D (liberdade provisória, só receptação) também tem fundamento técnico. Para a prova: marque A conforme o gabarito oficial. Decore: furto consumado dias antes + não há flagrante da receptação para o próprio ladrão = relaxamento."},
  {num:7, exame:"XXXVII Exame — 2023", titulo:"Preventiva de Ofício — Vedada Mesmo na Conversão do Flagrante", enunciado:"No dia 10 de julho de 2020, Pedro, primário, é preso em flagrante delito comercializando ecstasy. Com ele, são apreendidos 50 comprimidos e dinheiro em espécie. No dia 11 de julho, passadas 23 horas da prisão, Pedro é apresentado à autoridade judicial. A audiência é realizada sem a presença do Ministério Público e após entrevistar o preso e ouvir os requerimentos da defesa técnica, o Magistrado homologa a prisão em flagrante, que é convertida em preventiva, sob o fundamento de que existe risco à ordem pública na liberdade do agente.", comando:"Assinale a opção que indica a tese de Direito Processual Penal adequada para se questionar a prisão preventiva de Pedro.", gabarito:"D", alt:{"A": "A prisão deve ser relaxada em razão da inobservância do prazo para a realização da audiência de custódia.", "B": "A prisão deve ser substituída por medidas cautelares diversas da prisão, já que suficientes para garantia da ordem pública e conveniência da instrução criminal.", "C": "A prisão deve ser relaxada, ante a ausência de pedido do Ministério Público, e concedida prisão domiciliar ao acusado para garantia da ordem pública.", "D": "A prisão deve ser relaxada, pois o magistrado não poderia, diante da ausência de pedido do Parquet, ter convertido a prisão em flagrante em preventiva de ofício."}, fb:{"A": "Incorreta. A audiência ocorreu em 23 horas — dentro do prazo legal (24h). Não há ilegalidade pelo prazo.", "B": "Incorreta. Não se trata de discutir a suficiência das medidas — o problema é que a preventiva foi decretada SEM PEDIDO DO MP, o que é vedado.", "C": "Incorreta. Mistura relaxamento (prisão ilegal) com prisão domiciliar (que é medida alternativa, não decretada de ofício pelo juiz como regra).", "D": "Correta! Art. 311 CPP (Lei 13.964/19): a prisão preventiva somente pode ser decretada a requerimento do MP, do querelante, do assistente ou por representação da autoridade policial. Sem pedido do MP na audiência de custódia, o magistrado NÃO PODE converter o flagrante em preventiva de ofício. Preventiva de ofício = ilegal = relaxamento."}, fund:"Art. 311 CPP (Lei 13.964/19): vedada a decretação de preventiva de ofício em qualquer fase. Audiência de custódia sem manifestação do MP pelo requerimento de preventiva = juiz não pode decretar sozinho. A conversão do flagrante em preventiva de ofício é nula.", caqui:"O Pacote Anticrime acabou com o 'juiz ativista' em matéria de preventiva: sem pedido, sem preventiva. O MP estava presente na audiência e não pediu a preventiva. O juiz decretou sozinho. Isso é vedado desde 2019. É como o árbitro marcar um pênalti sem ninguém pedir — não pode. A tese da defesa é direta: sem pedido do MP = sem preventiva = relaxa."},
  {num:8, exame:"XXXVI Exame — 2022", titulo:"Preventiva em Violência Doméstica — Descumprimento de Medida Protetiva", enunciado:"Vitor respondia ação penal pela suposta prática do crime de ameaça (pena: 01 a 06 meses de detenção ou multa) contra sua ex-companheira Luiza, existindo medida protetiva em favor da vítima proibindo o acusado de se aproximar dela. Mesmo intimado da medida protetiva, Vitor se aproximou de Luiza e tentou manter com ela contato. Luiza esclareceu que, após a denúncia do crime de ameaça, Vitor veio a ser condenado, definitivamente, pela prática do delito de uso de documento falso por fatos que teriam ocorrido antes mesmo da infração penal cometida no contexto de violência doméstica.", comando:"Com base nas informações expostas, você, como advogado(a) de Luiza, deverá esclarecer à sua cliente que", gabarito:"D", alt:{"A": "não poderá ser decretada a prisão de Vitor, pois não há situação de flagrância.", "B": "não poderá ser decretada a prisão preventiva de Vitor, pois o crime de ameaça tem pena inferior a 04 anos e ele é tecnicamente primário.", "C": "poderá ser decretada a prisão preventiva de Vitor, pois, apesar de o crime de ameaça ter pena máxima inferior a 04 anos, o autor do fato é reincidente.", "D": "poderá ser decretada a prisão preventiva de Vitor, mesmo sendo tecnicamente primário, tendo em vista a existência de medida protetiva de urgência anterior descumprida."}, fb:{"A": "Incorreta. A ausência de flagrância não impede a preventiva — esta é medida cautelar autônoma, não depende de flagrante.", "B": "Incorreta. Em contexto de violência doméstica, o art. 313, III CPP prevê hipótese ESPECÍFICA que dispensa o requisito da pena superior a 4 anos: descumprimento de medida protetiva.", "C": "Incorreta. Vitor é TECNICAMENTE PRIMÁRIO — a condenação anterior foi por fatos praticados ANTES do crime de violência doméstica. Não há reincidência para fins do crime de VD. Mas mesmo sendo primário, cabe preventiva pelo descumprimento.", "D": "Correta! Art. 313, III CPP: cabe preventiva quando 'o crime envolver violência doméstica e familiar contra a mulher... para garantir a execução das medidas protetivas de urgência'. O descumprimento da medida protetiva é fundamento autônomo para a preventiva, independentemente da pena do crime e da primariedade."}, fund:"Art. 313, III CPP: preventiva cabe nos crimes com violência doméstica para garantir medidas protetivas, independentemente da pena máxima. O descumprimento de medida protetiva é fundamento direto. Não se exige pena > 4 anos nem reincidência nessa hipótese específica.", caqui:"A Lei Maria da Penha criou um 'atalho' para a preventiva: quando há violência doméstica + descumprimento de medida protetiva, o juiz pode decretar a preventiva INDEPENDENTEMENTE da pena do crime. Ameaça tem pena de 1 a 6 meses? Não importa. Vitor é primário? Não importa. Ele descumpriu a medida protetiva = cabe preventiva. Isso protege a vítima de stalkers que ficam 'testando os limites' da medida judicial."},
  {num:9, exame:"XXXV Exame — 2022", titulo:"Perseguição Encerrada — Fim do Flagrante Impróprio", enunciado:"Policiais militares, ao avistarem Jairo roubar um carro, passaram a persegui-lo ininterruptamente durante 28 horas. Por terem perdido de vista Jairo, os policiais se dirigiram à Delegacia para confecção do Boletim de Ocorrência. Antes de finalizar o BO, a Delegacia recebeu ligação do lesado (Luiz) informando que Jairo estava num bar. Os policiais se deslocaram ao bar, encontrando Jairo apenas de chinelo e bermuda, portando carteira de identidade e R$50,00. Nada mais foi encontrado. Jairo foi preso em flagrante com fundamento na situação de quase-flagrante, tendo os policiais e a vítima reconhecido Jairo.", comando:"Assinale a opção que indica o fundamento da sua manifestação nessa audiência para colocar Jairo em liberdade.", gabarito:"B", alt:{"A": "A prisão de Jairo era ilegal, pois a perseguição exigia que o carro fosse apreendido para comprovar a materialidade do crime.", "B": "A prisão de Jairo era ilegal, pois a perseguição foi encerrada em Toledo, tanto que os policiais militares se dirigiram à Delegacia para confecção do Boletim de Ocorrência. Restava cessada a situação a caracterizar um flagrante delito. Posterior prisão cautelar somente caberia por ordem judicial.", "C": "A prisão de Jairo era ilegal, pois o CPP somente autoriza a prisão em flagrante quando o agente está cometendo o crime, acaba de cometê-lo ou é encontrado logo depois com objetos do crime.", "D": "A prisão de Jairo era ilegal, pois o CPP autoriza a prisão em flagrante no quase-flagrante, não podendo passar a perseguição de 24 horas."}, fb:{"A": "Incorreta. A apreensão do carro não é requisito para o flagrante — basta o reconhecimento do autor e as circunstâncias que indiquem autoria.", "B": "Correta! O flagrante impróprio (quase-flagrante) exige perseguição CONTÍNUA e ININTERRUPTA. Ao se dirigirem à delegacia para lavrar o BO, os policiais demonstraram que a perseguição havia CESSADO. Sem perseguição contínua, não há mais situação flagrancial. A nova abordagem no bar precisaria de mandado judicial.", "C": "Incorreta. A alternativa esqueceu o flagrante impróprio (perseguição = art. 302, III CPP), que é sim hipótese legal. O problema não é a lista de hipóteses, mas o encerramento da perseguição.", "D": "Incorreta. A lei não estabelece prazo de 24h para a perseguição — o prazo de 24h é para lavrar o BO e comunicar ao juiz após a prisão. A perseguição pode durar mais, desde que seja contínua."}, fund:"Art. 302, III CPP: flagrante impróprio = perseguição contínua logo após o crime. Perseguição encerrada (BO na delegacia) = fim da situação flagrancial. Nova abordagem após cessar a perseguição = exige mandado de prisão preventiva ou temporária.", caqui:"O flagrante impróprio é como uma corrida: você tem que continuar correndo sem parar. Se os policiais foram para a delegacia fazer o BO, eles pararam de correr — a perseguição acabou. Quando chegaram ao bar, Jairo já não estava mais 'sendo perseguido'. Para prendê-lo agora, precisavam de mandado. É como um jogo de pega-pega: se você parar de perseguir, o flagrante acabou. Sem perseguição contínua = sem flagrante impróprio."},
  {num:10, exame:"XXXV Exame — 2022", titulo:"Prisão Domiciliar para Pai Responsável por Filho — Detração no Regime Inicial", enunciado:"Rodrigo responde ação penal pela suposta prática do crime de venda irregular de arma de fogo de uso restrito, na condição de preso. O magistrado tomou conhecimento de que Rodrigo seria pai de uma criança de 11 anos de idade e que seria o único responsável pelo menor, que foi encaminhado ao abrigo por não ter outros familiares. Com esse fundamento, substituiu, de ofício, a prisão preventiva por prisão domiciliar. Rodrigo, intimado da decisão, entrou em contato com seu(sua) advogado(a) em busca de esclarecimentos sobre o cabimento da medida e suas consequências.", comando:"A defesa técnica de Rodrigo deverá esclarecer que a concessão da prisão domiciliar foi", gabarito:"B", alt:{"A": "adequada, e o tempo recolhido em casa justifica o reconhecimento de detração do período de cumprimento, que deverá ser observado na execução da pena, mas não no momento da fixação do regime inicial do cumprimento de pena.", "B": "adequada, e o tempo recolhido em casa justifica o reconhecimento de detração do período de cumprimento, que poderá ser observado no momento da fixação do regime inicial de cumprimento de pena.", "C": "inadequada, pois somente admitida para as mulheres que sejam mães de crianças menores de 12 anos.", "D": "adequada, mas não justifica o reconhecimento de detração."}, fb:{"A": "Incorreta. A detração SIM pode ser considerada no regime inicial — a alternativa erra ao restringi-la apenas à execução da pena já fixada.", "B": "Correta! Dois pontos: (1) CABIMENTO: art. 318-A CPP (com interpretação extensiva pelo STJ): pai que seja responsável único por filho até 12 anos pode ter prisão domiciliar — não é exclusivo de mulheres. (2) DETRAÇÃO: art. 387, §2º CPP — o tempo de prisão domiciliar PODE ser computado como detração, inclusive para fins de fixação do regime inicial de cumprimento de pena.", "C": "Incorreta. A jurisprudência do STJ (HC 336.592) estendeu o benefício do art. 318 CPP ao pai que seja responsável único pelo cuidado de filho. Não é exclusivo de mulheres.", "D": "Incorreta. O tempo de prisão domiciliar É computado como detração (art. 387, §2º CPP e STJ)."}, fund:"Art. 318, III e IV CPP: prisão domiciliar para imprescindíveis ao cuidado de pessoa com deficiência ou gestante. STJ: extensão ao pai responsável único pelo filho. Art. 387, §2º CPP: detração considera o tempo de prisão domiciliar cautelar na fixação do regime inicial.", caqui:"Dois aprendizados numa questão: (1) Prisão domiciliar NÃO é só para mãe — pai que é o único responsável pelo filho também tem direito. O STJ abriu esse entendimento por analogia ao art. 318 CPP. (2) Detração de prisão domiciliar CONTA no regime inicial — se Rodrigo ficou 8 meses em casa sob prisão domiciliar e seria condenado a 4 anos em regime semiaberto, esse tempo pode ser abatido. Pensa: ele já 'cumpriu pena' em casa, isso deve contar."},
  {num:11, exame:"XXXIV Exame — 2022", titulo:"Lesão Corporal Culposa CTB + Prestação de Socorro — Relaxamento ou Liberdade Provisória", enunciado:"Ricardo, motorista profissional, conduzia seu veículo quando foi surpreendido com a travessia repentina de Igor, que conduzia uma bicicleta, vindo a atropelá-lo. Igor ficou no chão reclamando de muita dor no peito. Ricardo permaneceu no local e pediu ajuda ao Corpo de Bombeiros. A polícia militar chegou, fez o teste de bafômetro sendo o resultado zero. Diante da situação de flagrância, Ricardo foi preso e, no dia seguinte, levado à audiência de custódia. Igor fraturou 3 costelas e o tornozelo, sendo operado com sucesso.", comando:"Você, como advogado(a) de Ricardo, postularia", gabarito:"C", alt:{"A": "concessão da liberdade provisória, sem fiança, diante da legalidade da prisão, por se tratar de indiciado primário e de bons antecedentes, além de ter prestado imediato e integral socorro à vítima.", "B": "somente a imposição da medida cautelar diversa da prisão, consistente no comparecimento periódico em juízo, diante da legalidade da prisão e considerando que a custódia cautelar deve ser a última medida imposta.", "C": "relaxamento da prisão de Ricardo por ser ilegal, haja vista que prestou imediato e integral socorro à vítima.", "D": "concessão da liberdade provisória, mediante fiança, arbitrado o menor valor legal, diante da legalidade da prisão, por ser o indiciado primário e de bons antecedentes."}, fb:{"A": "Incorreta conforme gabarito FGV. A FGV não adotou a liberdade provisória como pedido correto neste caso.", "B": "Incorreta. Medida cautelar diversa pressupõe que a prisão seja legal. Se a FGV considerou a prisão ilegal, esse pedido não é o correto.", "C": "Correta conforme gabarito FGV! ⚠️ PONTO CONTROVERSO: a FGV adotou que o prestação de socorro integral tornaria a prisão ilegal. A lógica adotada: art. 301 CTB — o condutor que presta imediato e integral socorro não pode ser preso em flagrante, pois a norma do CTB cria uma excludente de punibilidade/situação que afasta a necessidade da prisão. ⚠️ Tecnicamente controvertido — prestar socorro normalmente é atenuante, não causa de ilegalidade da prisão.", "D": "Incorreta conforme gabarito FGV."}, fund:"Art. 301 CTB: obrigação de prestar socorro ao acidentado. FGV adotou a posição de que prestar socorro integral afasta a legalidade da prisão em flagrante neste contexto. Art. 5º, LXV, CF: prisão ilegal deve ser relaxada.", caqui:"⚠️ QUESTÃO CONTROVERSA: a FGV adotou C (relaxamento por ilegalidade pois prestou socorro). O raciocínio da banca: quem causa acidente culposo E presta socorro integral age exatamente como a lei determina — prender quem cumpriu a obrigação legal seria desproporcional e ilegal. Tecnicamente há debate sobre se o socorro torna a prisão ilegal ou apenas enseja liberdade provisória. Para a prova: marque C conforme o gabarito oficial. Mnemônico: 'Prestou socorro integral no CTB = relaxamento, não liberdade provisória'."},
  {num:12, exame:"XXXII Exame — 2021", titulo:"Preventiva de Ofício + Contemporaneidade — Dois Vícios Independentes", enunciado:"Em 14/01/2021, Valentim, reincidente, foi denunciado como incurso nas sanções do Art. 14 da Lei nº 10.826/03 (porte de arma de fogo de uso permitido), cuja pena prevista é de reclusão, de 2 a 4 anos, narrando a denúncia que, em 10/01/2017, o denunciado portava arma de fogo de uso permitido em via pública. Após recebimento da denúncia e apresentação de resposta à acusação, o magistrado, verificando que a única outra anotação que constava da Folha de Antecedentes Criminais era referente a delito da mesma natureza, decretou, apesar da ausência de requerimento, a prisão preventiva do denunciado, destacando o risco de reiteração delitiva.", comando:"Ao tomar conhecimento dos fatos, sob o ponto de vista técnico, a defesa de Valentim deverá argumentar que a prisão é inadequada porque", gabarito:"A", alt:{"A": "não poderia ter sido decretada de ofício e pela ausência de contemporaneidade, apesar de a pena máxima, por si só, não impedir o decreto prisional na situação diante da reincidência.", "B": "não poderia ter sido decretada de ofício, não havia contemporaneidade e porque, considerando a pena máxima, os pressupostos legais não estariam preenchidos.", "C": "não haveria contemporaneidade, apesar da possibilidade de decretação de ofício pelo momento processual e com base na reincidência.", "D": "não haveria contemporaneidade e considerando a pena máxima prevista para o delito, apesar de, pelo momento processual, ser possível a decretação de ofício."}, fb:{"A": "Correta! Dois vícios: (1) SEM PEDIDO = ilegal (art. 311 CPP, Lei 13.964/19). (2) SEM CONTEMPORANEIDADE: o crime ocorreu em 10/01/2017 e a preventiva foi decretada em 2021 — quase 4 anos depois. O STJ exige contemporaneidade entre os fatos e a decretação da preventiva. Mas: quanto à pena máxima de 4 anos com reincidente: art. 313, II CPP permite preventiva para reincidente, independentemente da pena máxima — esse argumento não prospera para a defesa.", "B": "Incorreta. Erra ao dizer que a pena máxima impediria os pressupostos. Com reincidência (art. 313, II), a pena máxima de 4 anos não impede a preventiva — esse fundamento é inválido para a defesa.", "C": "Incorreta. NÃO é possível decretar de ofício — art. 311 CPP vedou após 2019. Esta alternativa está na fase pré-Pacote Anticrime.", "D": "Incorreta. Combina erros: reincidente com pena de 4 anos cabe preventiva (art. 313, II) + não pode de ofício (art. 311)."}, fund:"Art. 311 CPP (Lei 13.964/19): vedada preventiva de ofício. STJ: contemporaneidade exigida — fatos de 2017 e preventiva em 2021 = sem contemporaneidade. Art. 313, II CPP: reincidente pode ter preventiva independentemente da pena máxima.", caqui:"Dois vícios, dois argumentos. VÍCIO 1: sem pedido do MP = sem preventiva (art. 311 pós-Pacote Anticrime). VÍCIO 2: contemporaneidade — crime de 2017, preventiva de 2021 = quase 4 anos depois, sem novos fatos concretos que justifiquem. O STJ exige que os fundamentos da preventiva sejam atuais, não baseados em fatos antigos. ATENÇÃO: a reincidência não serve para a defesa aqui — porque com reincidência cabe preventiva mesmo com pena de 4 anos (art. 313, II). A defesa não pode usar esse argumento contra a preventiva nesse caso."},
  {num:13, exame:"XXXI Exame — 2020", titulo:"Flagrante Retardado (Diferido) — Legal pela Lei 12.850/13", enunciado:"Durante escuta telefônica devidamente deferida para investigar organização criminosa destinada ao contrabando de armas, policiais obtiveram a informação de que Marcelo receberia, naquele dia, grande quantidade de armamento, que seria depois repassada a Daniel, chefe de sua facção. Os policiais se dirigiram até o local combinado, acompanharam o recebimento do armamento por Marcelo, optando por não o prender naquele momento, pois aguardariam que ele se encontrasse com o chefe da sua organização para prendê-los juntos. De posse do armamento, Marcelo se dirigiu ao encontro de Daniel e lhe repassou as armas contrabandeadas, quando ambos foram surpreendidos e presos em flagrante pelos policiais.", comando:"Com base nos fatos acima narrados, o advogado deverá esclarecer aos seus clientes que a prisão em flagrante efetuada pelos policiais foi", gabarito:"C", alt:{"A": "ilegal, por se tratar de flagrante esperado.", "B": "legal, restando configurado o flagrante preparado.", "C": "legal, tratando-se de flagrante retardado.", "D": "ilegal, pois a conduta dos policiais dependeria de prévia autorização judicial."}, fb:{"A": "Incorreta. Flagrante esperado é quando a polícia apenas aguarda o crime acontecer, sem intervir. Aqui houve adiamento deliberado da intervenção com autorização prévia — é retardado.", "B": "Incorreta. Flagrante preparado é quando a polícia provoca o crime — é ilegal (Súmula 145 STF). Aqui a polícia não induziu nem provocou: o crime já ia acontecer, ela apenas esperou o melhor momento.", "C": "Correta! FLAGRANTE RETARDADO (ou diferido): art. 8º da Lei 12.850/13 (organizações criminosas) e art. 53 da Lei 11.343/06 (tráfico). A polícia é autorizada a RETARDAR a prisão para obter maiores informações, identificar mais integrantes ou colher mais provas. Exige comunicação ao juízo. É LEGAL porque previsto em lei e com autorização prévia.", "D": "Incorreta. O juízo já havia deferido a escuta e foi comunicado — havia autorização judicial. A questão informa que a autoridade policial comunicou ao juízo competente."}, fund:"Art. 8º Lei 12.850/13: ação controlada (flagrante retardado) — a autoridade policial pode retardar a intervenção para obter maiores informações, após comunicação ao juízo competente. É legal. Difere do flagrante preparado (ilegal — Súmula 145 STF) e do flagrante esperado (legal, mas sem retardamento deliberado).", caqui:"Mapa dos flagrantes especiais: ESPERADO = polícia recebe a dica e aguarda o crime acontecer = legal. RETARDADO = polícia podia prender mas escolhe esperar para pegar mais gente = legal (com autorização do juiz). PREPARADO = polícia induziu, criou a situação = ilegal (crime impossível, Súmula 145 STF). Aqui: polícia sabia, comunicou o juiz, e ESPEROU para pegar o chefe também = retardado = legal. A diferença do esperado para o retardado: no retardado havia condições de prender e a polícia DELIBERADAMENTE aguardou."},
  {num:14, exame:"XXVII Exame — 2018", titulo:"Preventiva em Crime Culposo com Pena Máxima de 2 Anos — Ilegalidade", enunciado:"Após ser instaurado inquérito policial para apurar a prática de um crime de lesão corporal culposa praticada na direção de veículo automotor (Art. 303 da Lei nº 9.503/97 – pena: detenção de seis meses a dois anos), foi identificado que o autor dos fatos seria Carlos, que, em sua Folha de Antecedentes Criminais, possuía três anotações referentes a condenações com trânsito em julgado pela prática da mesma infração penal, todas aptas a configurar reincidência. O magistrado decretou a prisão preventiva, reiterando a reincidência de Carlos e destacando que essa circunstância faria com que todos os requisitos legais estivessem preenchidos.", comando:"Ao ser intimado da decisão, o(a) advogado(a) de Carlos deverá requerer", gabarito:"D", alt:{"A": "a liberdade provisória dele, ainda que com aplicação das medidas cautelares alternativas.", "B": "o relaxamento da prisão dele, tendo em vista que a prisão, em que pese ser legal, é desnecessária.", "C": "a revogação da prisão dele, tendo em vista que, em que pese ser legal, é desnecessária.", "D": "o relaxamento da prisão dele, pois ela é ilegal."}, fb:{"A": "Incorreta. Liberdade provisória pressupõe prisão legal. A preventiva é ilegal aqui — o pedido certo é relaxamento.", "B": "Incorreta. 'Em que pese ser legal, é desnecessária' — mas a prisão É ILEGAL (não legal). Relaxamento por desnecessidade também não é a fundamentação correta.", "C": "Incorreta. Revogação pressupõe prisão legal que perdeu seus fundamentos. Aqui a prisão nunca foi legal — é relaxamento.", "D": "Correta! Dois vícios: (1) Crime CULPOSO: a preventiva não se destina a crimes culposos. (2) Pena máxima de 2 ANOS: art. 313, I CPP exige pena máxima superior a 4 anos. Reincidência por si só não supre esses requisitos para crime culposo. Prisão ilegal = relaxamento (não revogação, não liberdade provisória)."}, fund:"Art. 313 CPP: preventiva cabe em: (I) dolosos com pena > 4 anos; (II) réu reincidente em crime doloso; (III) VD. Lesão culposa CTB: culposo + pena máx 2 anos = não atende nenhum critério. Mesmo com reincidência: o art. 313, II exige crime DOLOSO anterior. Prisão ilegal = relaxamento.", caqui:"Triângulo fundamental: RELAXAMENTO = prisão ilegal desde a origem. REVOGAÇÃO = prisão preventiva legal que perdeu seus fundamentos. LIBERDADE PROVISÓRIA = flagrante legal, mas sem necessidade de preventiva. Aqui: preventiva para crime culposo com pena de 2 anos = ilegal. A reincidência do art. 313 II só vale para crime doloso. Carlos tem 3 condenações, mas todas por crime culposo = não serve para o art. 313 II. Logo: ilegal = relaxamento."},
  {num:15, exame:"XXV Exame — 2018", titulo:"Prisão em Flagrante por Roubo Ilegal — Ausência de Situação Flagrancial", enunciado:"No dia 15 de maio de 2017, Caio conduzia veículo automotor quando foi solicitada sua parada em uma blitz. Os policiais constataram que o veículo era produto de crime de roubo ocorrido no dia 13 de maio de 2017. Diante da suposta prática do crime de receptação, realizaram a prisão e encaminharam Caio para a Delegacia. Em sede policial, a vítima do crime de roubo reconheceu Caio como o autor do crime que sofrera. A autoridade policial lavrou auto de prisão em flagrante pelo crime de roubo em detrimento de receptação. O Ministério Público, em audiência de custódia, manifesta-se pela conversão em preventiva, valorizando a reincidência de Caio.", comando:"Quando de sua manifestação, o advogado de Caio, sob o ponto de vista técnico, deverá requerer", gabarito:"B", alt:{"A": "liberdade provisória, pois, apesar da prisão em flagrante ser legal, não estão presentes os pressupostos para prisão preventiva.", "B": "relaxamento da prisão, em razão da ausência de situação de flagrante.", "C": "revogação da prisão preventiva, pois a prisão em flagrante pelo crime de roubo foi ilegal.", "D": "substituição da prisão preventiva por prisão domiciliar, pois Caio é responsável pelos cuidados de adolescente de 14 anos."}, fb:{"A": "Incorreta. A prisão EM FLAGRANTE NÃO era legal — logo, o pedido deve ser relaxamento (prisão ilegal), não liberdade provisória.", "B": "Correta! O roubo foi praticado em 13/05/2017 — dois dias antes da blitz. Não havia situação de flagrante para o crime de ROUBO: Caio não estava cometendo o crime, não havia sido perseguido imediatamente após, e não foi encontrado logo depois. A blitz dois dias depois não cria flagrante. Prisão em flagrante sem situação flagrancial = ilegal = relaxamento.", "C": "Incorreta. Não havia ainda preventiva decretada — a questão trata da audiência de custódia onde o MP pediu a conversão. O pedido deve ser o relaxamento do flagrante, não revogação da preventiva.", "D": "Incorreta. Adolescente de 14 anos não se encaixa na hipótese do art. 318 CPP (que exige criança até 12 anos ou imprescindibilidade dos cuidados)."}, fund:"Art. 302 CPP: flagrante = cometendo, acabou de cometer, perseguição imediata, encontrado logo após com objetos do crime. Roubo dois dias antes + blitz = sem situação flagrancial para o roubo. Reconhecimento pela vítima não supre a ausência de flagrante — exigiria mandado de prisão.", caqui:"O reconhecimento da vítima é uma prova — mas NÃO é flagrante. Para prender sem mandado, precisa de situação flagrancial. Caio foi abordado numa blitz dois dias depois — o roubo havia cessado (crime instantâneo). Sem flagrante = prisão ilegal = relaxamento. Pensa: se você rouba hoje e a polícia te encontra na semana que vem, eles não podem te prender em flagrante — precisam de mandado. A identidade apontada pela vítima gera o mandado, não o flagrante."},
  {num:16, exame:"XXIII Exame — 2017", titulo:"Advogado no Inquérito Policial — Súmula Vinculante 14 e Caráter Facultativo", enunciado:"Paulo foi preso em flagrante pela prática do crime de corrupção, sendo encaminhado para a Delegacia. Ao tomar conhecimento dos fatos, a mãe de Paulo entra, de imediato, em contato com o advogado, solicitando esclarecimentos e pedindo auxílio para seu filho.", comando:"De acordo com a situação apresentada, com base na jurisprudência dos Tribunais Superiores, deverá o advogado esclarecer que", gabarito:"D", alt:{"A": "diante do caráter inquisitivo do inquérito policial, Paulo não poderá ser assistido pelo advogado na delegacia.", "B": "a presença da defesa técnica, quando da lavratura do auto de prisão em flagrante, é sempre imprescindível, de modo que, caso não esteja presente, todo o procedimento será considerado nulo.", "C": "decretado o sigilo do procedimento, o advogado não poderá ter acesso aos elementos informativos nele constantes, ainda que já documentados no procedimento.", "D": "a Paulo deve ser garantida, na delegacia, a possibilidade de assistência de advogado, de modo que existe uma faculdade na contratação de seus serviços para acompanhamento do procedimento em sede policial."}, fb:{"A": "Incorreta. O caráter inquisitivo do inquérito não exclui a assistência do advogado. O investigado tem direito de ser assistido.", "B": "Incorreta. A presença do advogado no flagrante NÃO é requisito de validade. Sua ausência não nulifica o procedimento.", "C": "Incorreta. Súmula Vinculante 14 STF: o advogado tem direito ao acesso às provas JÁ DOCUMENTADAS no inquérito, mesmo sob sigilo. O sigilo não impede o acesso às peças já produzidas.", "D": "Correta! O investigado tem DIREITO de ser assistido por advogado (art. 7º Estatuto OAB). A presença do advogado é uma FACULDADE do investigado — ele pode contratar ou não. Mas não pode ser impedido de ser assistido se quiser. E mesmo sob sigilo, as provas documentadas são acessíveis ao advogado (SV 14)."}, fund:"Art. 7º, XXI, Estatuto OAB: direito do advogado de assistir o cliente no inquérito. SV 14 STF: acesso às provas já documentadas mesmo sob sigilo. Caráter inquisitivo do IP: não exclui a presença do advogado, mas a presença não é requisito de validade do procedimento.", caqui:"Inquérito inquisitivo ≠ inquérito sem advogado. O IP é inquisitivo porque não há contraditório pleno — mas o investigado pode ter advogado acompanhando. A Súmula Vinculante 14 diz: o advogado acessa o que já foi colhido e documentado no IP, mesmo que o procedimento esteja sob sigilo. Ele não acessa o que ainda não está documentado (diligências em andamento), mas acessa o que já está nos autos. E presença do advogado no flagrante: a lei não exige — a ausência não anula o flagrante."},
  {num:17, exame:"XVI Exame — 2015", titulo:"Prisão Temporária — Prazos, Vedação Decreto de Ofício e Separação dos Presos", enunciado:"A prisão temporária pode ser definida como uma medida cautelar restritiva, decretada por tempo determinado, destinada a possibilitar as investigações de certos crimes considerados pelo legislador como graves, antes da propositura da ação penal. Sobre o tema, assinale a afirmativa correta.", comando:"Sobre o tema, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Assim como a prisão preventiva, pode ser decretada de ofício pelo juiz, após requerimento do Ministério Público ou representação da autoridade policial.", "B": "Sendo o crime investigado hediondo, o prazo poderá ser fixado em, no máximo, 15 dias, prorrogáveis uma vez pelo mesmo período.", "C": "Findo o prazo da temporária sem prorrogação, o preso deve ser imediatamente solto.", "D": "O preso, em razão de prisão temporária, poderá ficar detido no mesmo local em que se encontram os presos provisórios ou os condenados definitivos."}, fb:{"A": "Incorreta. A prisão temporária NUNCA pode ser decretada de ofício — depende de representação da autoridade policial OU requerimento do MP. E a prisão preventiva também não pode mais de ofício (Lei 13.964/19).", "B": "Incorreta. O prazo para crimes hediondos é de 30 dias (não 15), prorrogáveis por igual período. A banca tentou trocar por 15 para confundir.", "C": "Correta! Lei 7.960/89, art. 2º, §7º: decorrido o prazo, se não houver prorrogação, o preso será IMEDIATAMENTE COLOCADO EM LIBERDADE, salvo se já tiver sido decretada sua prisão preventiva. Sem prorrogação = soltura imediata.", "D": "Incorreta. Lei 7.960/89, art. 3º: o preso temporário deve ficar SEPARADO dos presos provisórios e condenados definitivos."}, fund:"Lei 7.960/89: temporária por representação da autoridade policial ou requerimento do MP (nunca de ofício). Prazos: 5+5 dias (regra geral); 30+30 dias (hediondos). Art. 2º, §7º: findo o prazo sem prorrogação = soltura imediata. Art. 3º: separação dos demais presos.", caqui:"A prisão temporária tem quatro características importantes: (1) SEM de ofício = só por pedido do delegado ou MP. (2) PRAZOS: 5+5 (geral), 30+30 (hediondo). (3) ACABOU O PRAZO = solta imediatamente. (4) SEPARADO dos outros presos. A FGV testou todas as quatro nessa questão. Mnemônico dos prazos da temporária: '5 pra crime normal, 30 pra hediondo — ambos podem dobrar uma vez'."},
  {num:18, exame:"VIII Exame — 2012", titulo:"Flagrante Preparado — Crime Impossível e Relaxamento de Prisão", enunciado:"O deputado 'M' exigiu do presidente da empresa 'Z' R$ 500.000,00 para que esta pudesse participar de concorrência para obras. O presidente da empresa compareceu à Delegacia e informou o Delegado sobre o ocorrido, que o orientou a combinar a entrega da quantia para daqui a uma semana, oportunidade em que uma equipe de policiais estaria presente para efetuar a prisão em flagrante. No dia aprazado para a entrega da quantia indevida, os policiais prenderam em flagrante o deputado quando este conferia o valor entregue.", comando:"Na qualidade de advogado contratado pelo Deputado, assinale a alternativa que indica a peça processual ou pretensão processual, exclusiva de advogado, cabível na hipótese.", gabarito:"C", alt:{"A": "Liberdade Provisória.", "B": "Habeas Corpus.", "C": "Relaxamento de Prisão.", "D": "Revisão Criminal."}, fb:{"A": "Incorreta. Liberdade provisória pressupõe prisão legal. Aqui a prisão é ilegal (flagrante preparado = crime impossível). O HC pode ser usado mas não é ato exclusivo de advogado.", "B": "Incorreta. O habeas corpus NÃO é ato exclusivo de advogado — pode ser impetrado por qualquer pessoa (art. 654 CPP). A questão pede pretensão EXCLUSIVA de advogado.", "C": "Correta! O pedido de relaxamento de prisão é ato que o advogado pratica em nome do cliente (petição dirigida ao juiz). É a medida adequada porque: (1) flagrante preparado = a polícia induziu o crime; (2) Súmula 145 STF: sem crime, pois a consumação era impossível (polícia estava no controle de tudo); (3) prisão ilegal = relaxamento. E é ato exclusivo de advogado (diferente do HC que qualquer pessoa pode impetrar).", "D": "Incorreta. Revisão criminal é cabível após sentença condenatória transitada em julgado. Ainda não houve sequer processo."}, fund:"Súmula 145 STF: não há crime quando a preparação do flagrante pela polícia torna impossível a sua consumação. Flagrante preparado = crime impossível = prisão ilegal = relaxamento. HC: qualquer pessoa pode impetrar (art. 654 CPP). Relaxamento: petição ao juiz, ato de advogado.", caqui:"Flagrante preparado = armadilha policial onde o crime nunca poderia se consumar por iniciativa própria do investigado. A Súmula 145 STF diz: isso é crime impossível. Sem crime = sem flagrante = prisão ilegal = relaxamento. O HC seria válido para obter a liberdade, mas NÃO é ato exclusivo de advogado — qualquer pessoa pode impetrar HC. A questão pediu EXCLUSIVO de advogado = relaxamento (petição ao juiz). Distinção importante para a 2ª fase!"},
  {num:19, exame:"IX Exame — 2012", titulo:"Tipos de Flagrante — Flagrante Impróprio (Quase-Flagrante)", enunciado:"O Código de Processo Penal pátrio menciona que também se considera em flagrante delito quem é perseguido, logo após o delito, pela autoridade, pelo ofendido ou por qualquer pessoa, em situação que faça presumir ser o perseguido autor da infração.", comando:"A essa modalidade dá-se o nome de flagrante", gabarito:"A", alt:{"A": "impróprio.", "B": "ficto.", "C": "diferido ou retardado.", "D": "esperado."}, fb:{"A": "Correta! Art. 302, III CPP: 'é perseguido, logo após, pela autoridade, pelo ofendido ou por qualquer pessoa, em situação que faça presumir ser autor da infração' = FLAGRANTE IMPRÓPRIO (ou quase-flagrante).", "B": "Incorreta. Flagrante FICTO (ou presumido): art. 302, IV CPP — agente encontrado 'logo depois' com instrumentos, armas, objetos ou papéis que façam presumir ser o autor da infração. Não há perseguição — o agente é simplesmente ENCONTRADO com os objetos.", "C": "Incorreta. Flagrante diferido ou retardado: técnica especial de investigação onde a polícia adia propositalmente a prisão para colher mais provas ou identificar mais participantes. Está nos arts. 8º Lei 12.850/13 e 53 Lei 11.343/06.", "D": "Incorreta. Flagrante esperado: a polícia recebe informação que um crime vai ocorrer e aguarda o momento para prender. Não há induzimento — apenas espera. É legal."}, fund:"Art. 302 CPP: I e II = flagrante próprio. III = flagrante impróprio (quase-flagrante) = perseguição imediata. IV = flagrante ficto/presumido = encontrado logo depois com objetos do crime.", caqui:"Tabela dos flagrantes do art. 302 CPP: PRÓPRIO (I e II) = crime rolando ou acabou de rolar. IMPRÓPRIO/QUASE-FLAGRANTE (III) = saiu correndo e estão perseguindo. FICTO/PRESUMIDO (IV) = não estava fugindo, mas foi encontrado com os objetos do crime. RETARDADO = a polícia podia prender mas esperou estrategicamente (fora do 302, está em leis especiais). ESPERADO = polícia recebeu dica e aguardou. Decorando: 'Impróprio tem perseguição. Ficto tem objeto nas mãos.'"},
  {num:20, exame:"III Exame — 2011", titulo:"Prisão Cautelar — Modalidades, Prazos da Temporária e Fundamentos da Preventiva", enunciado:"Como se sabe, a prisão processual (provisória ou cautelar) é a decretada antes do trânsito em julgado de sentença penal condenatória, nas hipóteses previstas em lei. A respeito de tal modalidade de prisão, é correto afirmar que", comando:"Assinale a afirmativa correta.", gabarito:"C", alt:{"A": "em nosso ordenamento jurídico, a prisão processual contempla as seguintes modalidades: prisão em flagrante, preventiva, temporária, por pronúncia e em virtude de sentença condenatória recorrível.", "B": "a prisão temporária tem como pressupostos a existência de indícios de autoria e prova da materialidade, e como fundamentos a necessidade de garantia da ordem pública, a conveniência da instrução criminal, a necessidade de garantir a futura aplicação da lei penal e a garantia da ordem pública.", "C": "o prazo de duração da prisão temporária é de cinco dias, prorrogável por mais cinco em caso de extrema e comprovada necessidade. Em se tratando, todavia, de crime hediondo, a prisão temporária poderá ser decretada pelo prazo de trinta dias, prorrogável por igual período.", "D": "são requisitos da prisão preventiva a sua imprescindibilidade para as investigações do inquérito policial e o fato de o indiciado não ter residência fixa ou não fornecer elementos necessários ao esclarecimento de sua identidade."}, fb:{"A": "Incorreta. Após a Lei 12.403/2011, as modalidades de prisão cautelar são: flagrante, preventiva e temporária. As antigas 'prisão por pronúncia' e 'prisão em razão de sentença condenatória recorrível' foram EXTINTAS — hoje, após a pronúncia ou condenação recorrível, aplica-se a preventiva se necessário.", "B": "Incorreta. Confunde os pressupostos e fundamentos da PREVENTIVA com os da TEMPORÁRIA. A temporária tem seus próprios requisitos na Lei 7.960/89.", "C": "Correta! Lei 7.960/89: prazo geral = 5 dias + 5 dias. Para crimes hediondos (Lei 8.072/90): 30 dias + 30 dias. Esse é o regime de prazos legalmente correto.", "D": "Incorreta. Os requisitos descritos (imprescindibilidade para investigações, ausência de residência fixa) são da TEMPORÁRIA (Lei 7.960/89), não da PREVENTIVA (art. 312 CPP)."}, fund:"Lei 12.403/2011: extinção das prisões por pronúncia e por sentença condenatória recorrível. Modalidades atuais: flagrante, preventiva, temporária. Temporária: 5+5 (regra) ou 30+30 (hediondo). Preventiva: fundamentos art. 312 CPP. Temporária: requisitos Lei 7.960/89.", caqui:"Após 2011, acabaram dois tipos de prisão: a 'pronúncia' e a 'sentença recorrível'. Hoje só existem três cautelares: FLAGRANTE, PREVENTIVA e TEMPORÁRIA. A FGV coloca as extintas para você marcar como correto. Não caia. E cuidado com a confusão de fundamentos: PREVENTIVA = garantia da ordem pública/econômica, conveniência da instrução, aplicação da lei penal. TEMPORÁRIA = imprescindível para as investigações, suspeito identificado, crime no rol da lei. São listas diferentes!"},
  {num:21, exame:"CESPE — 2009", titulo:"Crime Permanente, Pressupostos da Preventiva e Apresentação Espontânea", enunciado:"Acerca das prisões cautelares, assinale a opção correta.", comando:"Acerca das prisões cautelares, assinale a opção correta.", gabarito:"C", alt:{"A": "Considere que Amanda, na intenção de obter vantagem econômica, tenha sequestrado Bruna, levando-a para o cativeiro. Nesse caso, a prisão em flagrante de Amanda só poderá ocorrer até vinte e quatro horas após a constrição da liberdade de Bruna, devendo a autoridade policial, caso descubra o paradeiro da vítima após tal prazo, solicitar ao juiz competente o mandado de prisão contra a sequestradora.", "B": "São pressupostos da prisão preventiva: garantia da ordem pública ou da ordem econômica; conveniência da instrução criminal; garantia de aplicação da lei penal; prova da existência do crime; indício suficiente de autoria.", "C": "Em regra, a prisão temporária deve ter duração máxima de cinco dias. Tratando-se, no entanto, de procedimento destinado à apuração da prática de delito hediondo, tal prazo poderá estender-se para trinta dias, prorrogável por igual período em caso de extrema e comprovada necessidade.", "D": "A apresentação espontânea do acusado à autoridade policial, ao juiz criminal ou ao MP impede a prisão preventiva, devendo o acusado responder ao processo em liberdade."}, fb:{"A": "Incorreta. Sequestro é crime PERMANENTE — enquanto a vítima está privada de liberdade, o crime está em execução. A situação de flagrante persiste pelo tempo que durar a privação. Não há prazo de 24h para o flagrante de crime permanente.", "B": "Incorreta. Mistura pressupostos com fundamentos. PRESSUPOSTOS (fumus comissi delicti): prova da materialidade + indícios de autoria. FUNDAMENTOS (periculum libertatis): ordem pública, ordem econômica, instrução criminal, aplicação da lei penal. A alternativa juntou tudo como se fossem pressupostos.", "C": "Correta! Lei 7.960/89: 5+5 dias (regra). Lei 8.072/90: 30+30 dias (hediondos e equiparados). A alternativa reproduz corretamente o regime de prazos.", "D": "Incorreta. A apresentação espontânea NÃO impede a preventiva — se os requisitos legais estiverem presentes, a preventiva pode ser decretada mesmo para quem se apresentou voluntariamente."}, fund:"Crimes permanentes: situação de flagrante persiste enquanto durar a permanência. Preventiva: pressupostos (materialidade + autoria) ≠ fundamentos (ordem pública, econômica, instrução, lei penal). Temporária: 5+5 (geral), 30+30 (hediondo). Apresentação espontânea: não impede a preventiva.", caqui:"Quatro temas numa questão só. (A) Crime permanente = flagrante a qualquer momento (não tem prazo de 24h). (B) Pressupostos ≠ fundamentos da preventiva: pressupostos = fumaça do crime (materialidade + autoria). Fundamentos = perigo da liberdade (ordem pública etc.). (C) Temporária: 5+5 ou 30+30. Correto! (D) Apresentação voluntária não é 'vacina' contra preventiva — se os fundamentos existem, ela pode ser decretada mesmo assim."},
  {num:22, exame:"CESPE — 2008 (OAB-SP)", titulo:"Perseguição em Outra Comarca — Art. 290 CPP e Emprego da Força", enunciado:"Relativamente à prisão, assinale a opção correta de acordo com o CPP.", comando:"Assinale a opção correta de acordo com o CPP.", gabarito:"A", alt:{"A": "Se o réu, sendo perseguido, passar ao território de outro município ou comarca, o executor poderá efetuar-lhe a prisão no lugar onde o alcançar, apresentando-o imediatamente à autoridade local, que providenciará a remoção do preso depois de haver lavrado, se for o caso, o auto de flagrante.", "B": "Na hipótese de resistência à prisão em flagrante, por parte de terceiras pessoas, diversas do réu, o executor e as pessoas que o auxiliarem não poderão usar dos meios necessários para defender-se ou para vencer a resistência.", "C": "Na hipótese de o executor do mandado verificar, com segurança, que o réu tenha entrado em alguma casa, o morador será intimado a entregá-lo, à vista da ordem de prisão. Se não for atendido imediatamente, o executor convocará duas testemunhas e, ainda que seja noite, entrará à força na casa.", "D": "Ainda que haja tentativa de fuga do preso, não será permitido o emprego de força."}, fb:{"A": "Correta! Art. 290 CPP: quando o réu em perseguição passar para outra comarca, o executor pode prendê-lo onde o alcançar, apresentando-o à autoridade local, que tomará as providências cabíveis (inclusive lavratura do auto de flagrante, se for o caso).", "B": "Incorreta. Art. 292 CPP: O emprego de força É PERMITIDO para vencer resistência ou impedir fuga, tanto pelo executor quanto pelas pessoas que o auxiliam — desde que indispensável e proporcional.", "C": "Incorreta. Art. 293 CPP: se o réu entrar em casa à NOITE e o morador não o entregar, o executor deve guardar todas as saídas e aguardar o AMANHECER para ingressar à força, se necessário. Não pode entrar à força durante a noite sem consentimento.", "D": "Incorreta. Art. 292 CPP: tentativa de fuga autoriza o emprego proporcional de força."}, fund:"Art. 290 CPP: perseguição que ultrapassa comarca — prisão onde alcançar, apresentação à autoridade local. Art. 292 CPP: força é permitida para vencer resistência ou impedir fuga. Art. 293 CPP: ingresso em casa à noite sem consentimento = espera o amanhecer.", caqui:"Três regras práticas do CPP sobre execução de prisão: (1) FUGIU PARA OUTRA COMARCA? A perseguição continua e você pode prender lá — depois apresenta à autoridade local. (2) RESISTÊNCIA? Pode usar força proporcional — tanto o executor quanto os que o ajudam. (3) ENTROU EM CASA À NOITE? Sem consentimento do morador, você aguarda o amanhecer. De dia pode entrar à força. À noite: espera amanhecer. A alternativa C é a clássica pegadinha: diz que pode entrar à noite imediatamente — não pode."},
  {num:23, exame:"CESPE — 2008 (OAB)", titulo:"Critérios para Fixação da Fiança — Grau de Instrução Não É Critério Legal", enunciado:"Os parâmetros previstos no CPP para que a autoridade determine o valor da fiança não incluem", comando:"Assinale a afirmativa correta.", gabarito:"B", alt:{"A": "a natureza da infração.", "B": "o grau de instrução do acusado.", "C": "a vida pregressa do acusado.", "D": "o valor provável das custas do processo."}, fb:{"A": "Incorreta. A natureza da infração É critério legal para fixação da fiança (art. 325 CPP).", "B": "Correta! O GRAU DE INSTRUÇÃO (escolaridade) do acusado NÃO consta do rol do art. 325 CPP como parâmetro para fixação da fiança.", "C": "Incorreta. A vida pregressa do acusado É critério legal (art. 325 CPP).", "D": "Incorreta. A importância provável das custas do processo É critério legal (art. 325 CPP)."}, fund:"Art. 325 CPP: critérios para fixação da fiança — natureza da infração, condições pessoais de fortuna e vida pregressa do acusado, periculosidade, e importância provável das custas do processo. GRAU DE INSTRUÇÃO não integra o rol.", caqui:"Pensa nos critérios da fiança como os fatores que o banco analisa para dar crédito: analisa o histórico (vida pregressa), o que está em jogo (natureza do crime), o patrimônio (fortuna), o risco (periculosidade) e os custos (custas). O que o banco NÃO analisa: se você é doutor ou não tem o ensino fundamental completo. Escolaridade = não entra. A FGV coloca grau de instrução junto com características pessoais verdadeiras para confundir. Decorar o que NÃO entra: escolaridade, profissão isoladamente, estado civil."},
];
let cur=0,N=QUESTOES.length;const E=Array(N).fill(null);
function init(){const nw=document.getElementById('nw'),ct=document.getElementById('ct');QUESTOES.forEach((q,i)=>{const b=document.createElement('button');b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);});upd();us();}
function bc(q,i){const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação do Prof. Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;}
function resp(i,l,btn){if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});const ok=l===q.gabarito,f=document.getElementById('f'+i);f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
</body>
</html>
